[scanning]
parallel_hosts = 3
scan_period = "daily"  # how often each minion is scanned: hourly, daily, weekly, monthly
# Optional. Newly accepted minions wait this long after first being observed
# before their first scan, giving setup time to finish (default 3).
# initial_scan_delay_hours = 3
# Optional. If set, reports are written to {report_directory}/{isodate}/{minion_id}
# instead of being printed to stdout.
# report_directory = "/var/lib/salt-security-agent/reports"

[llm]
url = "https://api.openai.com/v1"
access_token = "sk-changeme"
model = "gpt-4o"
threat_model_path = "threat_models/"
task_path = "tasks/"
# Optional. Context window of the model in tokens (default 120000). When the
# serialized message history exceeds context_window_tokens * context_char_multiplier
# characters, the agent stops calling tools and is forced to emit its report.
# context_window_tokens = 120000
# context_char_multiplier = 3.0
# Optional. HTTP timeout in seconds for LLM API requests (default 300).
# request_timeout_seconds = 300

[salt]
repo_path = "/srv/salt"

[celery]
broker_url = "redis://localhost:6379/0"
result_backend = "redis://localhost:6379/0"

# Optional. If present, alerts are also delivered by e-mail.
# [smtp]
# host = "smtp.example.com"
# port = 587
# username = "alerts@example.com"
# password = "changeme"
# from_address = "alerts@example.com"
# to_address = "soc@example.com"
# use_starttls = true  # STARTTLS on the given port; set false for implicit TLS / SMTPS on 465
